<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bubu ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* The Heart Button */
        #enter-btn {
            padding: 20px 40px;
            font-size: 24px;
            background-color: #ff3366;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: pulse 2s infinite;
            z-index: 10;
        }

        #enter-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 51, 102, 0.6);
        }

        /* Container for the surprise */
        #content-container {
            display: none; /* Hidden initially */
            flex-direction: column;
            align-items: center;
            max-width: 90%;
            width: 400px;
            z-index: 10;
        }

        /* The Image Styling */
        #bubu-pic {
            width: 100%;
            max-height: 60vh;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            opacity: 0; /* Hidden initially for animation */
            transform: translateY(20px);
            border: 5px solid white;
        }

        /* The Message Styling */
        .message-box {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 15px;
            opacity: 0; /* Hidden initially for animation */
            transform: translateY(20px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #d63384;
            margin: 0 0 10px 0;
            font-size: 28px;
        }

        p {
            color: #444;
            font-size: 18px;
            line-height: 1.6;
            margin: 0;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Falling Hearts Animation */
        .heart-bg {
            position: absolute;
            color: #ff3366;
            opacity: 0.6;
            top: -10vh;
            font-size: 1.5rem;
            animation: fall linear forwards; 
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
            }
        }

    </style>
</head>
<body>

    <button id="enter-btn">Tap for a Surprise, Bubu ❤️</button>

    <div id="content-container">
        <img src="https://i.ibb.co/5XJmzr3k/Whats-App-Image-2026-02-14-at-7-09-21-PM.jpg" alt="Shreeja" id="bubu-pic">
        
        <div class="message-box" id="message-text">
            <h1>To My Forever Valentine</h1>
            <p>
                Happy Valentine's Day, Bubu! ❤️<br><br>
                Life is just better with you by my side. Thank you for all the smiles, the love, and the memories.<br><br>
                I love you more than words can say.
            </p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('enter-btn');
        const container = document.getElementById('content-container');
        const pic = document.getElementById('bubu-pic');
        const msg = document.getElementById('message-text');

        // Function to create falling hearts background
        function createHearts() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's'; 
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Start hearts immediately
        setInterval(createHearts, 300);

        // Interaction Logic
        btn.addEventListener('click', function() {
            // 1. Hide the button
            btn.style.display = 'none';
            
            // 2. Show the container
            container.style.display = 'flex';

            // 3. Animate the Picture First
            pic.style.animation = 'fadeInUp 1.5s ease-out forwards';

            // 4. Animate the Message AFTER the picture (1.5 seconds delay)
            setTimeout(() => {
                msg.style.animation = 'fadeInUp 1.5s ease-out forwards';
            }, 1500);
        });
    </script>

</body>
</html>
